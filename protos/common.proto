syntax = "proto3";
package nexusflow;
option go_package = "github.com/MikeCHOKKI/nexusflow/protos/gen/go/nexusflow";

// ─── Shared Types ─────────────────────────────────────────────

message Empty {}

message Pagination {
  int32 page = 1;
  int32 limit = 2;
  int32 total = 3;
}

message Metadata {
  string created_at = 1;
  string updated_at = 2;
}
