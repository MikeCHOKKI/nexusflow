syntax = "proto3";
package nexusflow;
option go_package = "github.com/MikeCHOKKI/nexusflow/protos/gen/go/nexusflow";

import "common.proto";

// ─── Catalog Service ──────────────────────────────────────────

service CatalogService {
  rpc CreateProduct(CreateProductRequest) returns (Product);
  rpc GetProduct(GetProductRequest) returns (Product);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (Product);
  rpc DeleteProduct(DeleteProductRequest) returns (Empty);
}

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  string currency = 5;        // "XOF" | "EUR" | "USD"
  string category = 6;
  int32 stock = 7;
  string image_url = 8;
  bool is_active = 9;
  Metadata metadata = 15;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  double price = 3;
  string currency = 4;
  string category = 5;
  int32 stock = 6;
  string image_url = 7;
}

message GetProductRequest {
  string id = 1;
}

message ListProductsRequest {
  int32 page = 1;
  int32 limit = 2;
  string category = 3;
  string search = 4;
}

message ListProductsResponse {
  repeated Product products = 1;
  Pagination pagination = 2;
}

message UpdateProductRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  string currency = 5;
  string category = 6;
  int32 stock = 7;
  string image_url = 8;
  bool is_active = 9;
}

message DeleteProductRequest {
  string id = 1;
}
